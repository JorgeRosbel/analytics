name: CI

# Compila, lintea y comprueba formato en cada push a main y en cada PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Prettier · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Format check (Prettier)
        run: pnpm check

      - name: Build (tsc + vite)
        run: pnpm build
